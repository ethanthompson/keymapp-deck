<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set RGB (All Keys)</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #1d1d1d;
        color: #d8d8d8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        padding: 12px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .row label {
        width: 86px;
        flex-shrink: 0;
        color: #888;
        text-align: right;
        font-size: 12px;
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
      }

      input[type="color"] {
        width: 40px;
        height: 26px;
        border: 1px solid #3d3d3d;
        border-radius: 4px;
        background: #2d2d2d;
        cursor: pointer;
        padding: 2px;
        flex-shrink: 0;
      }

      input[type="text"].hex-input {
        flex: 1;
        background: #2d2d2d;
        border: 1px solid #3d3d3d;
        border-radius: 4px;
        color: #d8d8d8;
        font-size: 13px;
        font-family: monospace;
        height: 26px;
        padding: 0 8px;
        outline: none;
        transition: border-color 0.15s;
        text-transform: uppercase;
      }
      input[type="text"].hex-input:focus { border-color: #6c6cff; }

      .divider {
        border: none;
        border-top: 1px solid #2d2d2d;
        margin: 12px 0;
      }

      .section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #555;
        padding-left: 96px;
        margin-bottom: 10px;
      }

      .row input[type="text"].path-input {
        flex: 1;
        background: #2d2d2d;
        border: 1px solid #3d3d3d;
        border-radius: 4px;
        color: #d8d8d8;
        font-size: 13px;
        height: 26px;
        padding: 0 8px;
        outline: none;
        transition: border-color 0.15s;
      }
      .row input[type="text"].path-input:focus { border-color: #6c6cff; }

      .hint {
        color: #555;
        font-size: 11px;
        line-height: 1.5;
        padding-left: 96px;
        margin-top: -6px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>

    <div class="row">
      <label for="colorPicker">Color</label>
      <div class="color-row">
        <input type="color" id="colorPicker" value="#ffffff" />
        <input type="text" id="hexInput" class="hex-input" maxlength="7" value="#FFFFFF" spellcheck="false" autocomplete="off" />
      </div>
    </div>

    <hr class="divider" />
    <p class="section-label">Advanced</p>

    <div class="row">
      <label for="kontrollPath">CLI path</label>
      <input type="text" id="kontrollPath" class="path-input" placeholder="Auto-detect" spellcheck="false" autocomplete="off" />
    </div>
    <p class="hint">Leave blank to use the bundled binary.</p>

    <script>
      "use strict";

      let websocket = null;
      let actionContext = null;
      let actionUUID = null;
      let settings = {};

      function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
        actionUUID = uuid;
        const parsed = JSON.parse(actionInfo);
        actionContext = parsed.context;
        settings = Object.assign({ color: "FFFFFF" }, parsed.payload?.settings ?? {});
        applyToUI(settings);

        websocket = new WebSocket(`ws://127.0.0.1:${port}`);
        websocket.onopen = () => {
          websocket.send(JSON.stringify({ event: registerEvent, uuid: actionUUID }));
          websocket.send(JSON.stringify({ event: "getSettings", context: actionUUID }));
        };
        websocket.onmessage = (ev) => {
          try {
            const data = JSON.parse(ev.data);
            if (data.event === "didReceiveSettings") {
              settings = Object.assign({ color: "FFFFFF" }, data.payload?.settings ?? {});
              applyToUI(settings);
            }
          } catch (_) {}
        };
      }

      function normalizeToPickerHex(color) {
        const bare = color.replace(/^#/, "");
        return "#" + bare.toUpperCase().padEnd(6, "0").slice(0, 6);
      }

      function applyToUI(s) {
        const hex = normalizeToPickerHex(s.color || "FFFFFF");
        document.getElementById("colorPicker").value = hex.toLowerCase();
        document.getElementById("hexInput").value = hex;
        document.getElementById("kontrollPath").value = s.kontrollPath ?? "";
      }

      function isValidHex(str) {
        return /^#?[0-9A-Fa-f]{6}$/.test(str.trim());
      }

      function save() {
        if (!websocket || websocket.readyState !== WebSocket.OPEN) return;
        const color = document.getElementById("hexInput").value.replace(/^#/, "").toUpperCase() || "FFFFFF";
        const kontrollPath = document.getElementById("kontrollPath").value.trim() || undefined;
        settings = { color, kontrollPath };
        websocket.send(JSON.stringify({ event: "setSettings", context: actionUUID, payload: settings }));
      }

      document.getElementById("colorPicker").addEventListener("input", (e) => {
        const hex = e.target.value.toUpperCase();
        document.getElementById("hexInput").value = hex;
        save();
      });

      document.getElementById("hexInput").addEventListener("change", (e) => {
        const raw = e.target.value.trim();
        if (!isValidHex(raw)) return;
        const hex = normalizeToPickerHex(raw);
        document.getElementById("colorPicker").value = hex.toLowerCase();
        document.getElementById("hexInput").value = hex;
        save();
      });

      document.getElementById("kontrollPath").addEventListener("change", save);
    </script>
  </body>
</html>
