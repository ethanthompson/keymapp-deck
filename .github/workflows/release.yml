name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Required to create GitHub releases and upload assets
permissions:
  contents: write

jobs:
  # ── Download kontroll binaries (shared artifact) ──────────────────────────
  kontroll-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download kontroll binaries
        run: node scripts/download-kontroll.mjs

      - name: Upload vendor binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor-binaries
          path: com.ethanthompson.keymapp-layers.sdPlugin/vendor/
          retention-days: 1

  # ── Build Stream Deck plugin JS ───────────────────────────────────────────
  build-plugin:
    runs-on: ubuntu-latest
    needs: kontroll-binaries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Restore vendor binaries
        uses: actions/download-artifact@v4
        with:
          name: vendor-binaries
          path: com.ethanthompson.keymapp-layers.sdPlugin/vendor/

      - name: Build plugin TypeScript
        run: npm run build

      - name: Package .streamDeckPlugin
        run: node scripts/pack-plugin.mjs

      - name: Upload .streamDeckPlugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin
          path: dist/*.streamDeckPlugin
          retention-days: 1

      - name: Upload built sdPlugin for installer jobs
        uses: actions/upload-artifact@v4
        with:
          name: sdplugin-dir
          path: com.ethanthompson.keymapp-layers.sdPlugin/
          retention-days: 1

  # ── macOS DMG ─────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    needs: build-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Restore built sdPlugin
        uses: actions/download-artifact@v4
        with:
          name: sdplugin-dir
          path: com.ethanthompson.keymapp-layers.sdPlugin/

      - name: Build macOS DMG
        env:
          # To enable code signing + notarization, add these secrets in GitHub:
          # CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish never

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/installer/*.dmg
          retention-days: 1

  # ── Windows EXE ───────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    needs: build-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Restore built sdPlugin
        uses: actions/download-artifact@v4
        with:
          name: sdplugin-dir
          path: com.ethanthompson.keymapp-layers.sdPlugin/

      - name: Build Windows EXE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: dist/installer/*.exe
          retention-days: 1

  # ── Publish GitHub Release ────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [build-plugin, build-mac, build-win]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Installation

            ### macOS
            1. Download the `.dmg`, open it, and drag **Keymapp Deck** to Applications.
            2. **First launch:** macOS will block the app because it isn't notarized. Right-click (or Control-click) the app and choose **Open**, then click **Open** in the dialog. You only need to do this once.

            ### Windows
            Download and run the `.exe` installer.

            ### Stream Deck plugin only
            Download the `.streamDeckPlugin` file and double-click it to install directly via Stream Deck.

            ---
            **Requires:** [Keymapp](https://www.zsa.io/keymapp) with API enabled (Keymapp → Settings → Enable API).
          files: |
            release-assets/streamdeck-plugin/*.streamDeckPlugin
            release-assets/mac-dmg/*.dmg
            release-assets/win-exe/*.exe
